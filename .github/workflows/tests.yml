name: tests

on:
  pull_request:
    branches: [main, feature/prediction-market-bot]
  push:
    branches: [main, feature/prediction-market-bot]
  workflow_dispatch:

jobs:
  prediction-market-tests:
    name: prediction-market test suite
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system dependencies (TA-Lib)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget build-essential
          wget -q http://prdownloads.sourceforge.net/ta-lib/ta-lib-0.4.0-src.tar.gz
          tar -xzf ta-lib-0.4.0-src.tar.gz
          cd ta-lib && ./configure --prefix=/usr && make -s && sudo make install
          cd .. && rm -rf ta-lib ta-lib-0.4.0-src.tar.gz

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run prediction-market scanner test suite
        env:
          PYTHONPATH: src
        run: python -m unittest discover -s tests/prediction_market_scanner

      - name: Run feature compute tests
        run: python -m unittest tests.test_compute_features
